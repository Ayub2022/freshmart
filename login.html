<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
    <div class="min-h-screen flex items-center justify-center bg-slate-50 px-6">

  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold">
        <span class="text-green-700">FRESH</span><span class="text-orange-500">MART</span>
      </h1>

      <p class="text-slate-500 mt-2">
        Log in to your account
      </p>
    </div>

    <form class="space-y-4">

      <input
        type="email"
        placeholder="Email address"
        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
      >

      <input
        type="password"
        placeholder="Password"
        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
      >

      <button
        type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">
        Log In
      </button>

    </form>

    <p class="text-center text-slate-500 mt-6">
      Don't have an account?
      <a href="register.html"
         class="text-green-600 font-medium hover:underline">
        Sign up
      </a>
    </p>

  </div>

</div>
</body>
</html>
