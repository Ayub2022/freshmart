<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freshmart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-green-700">
                <span class="text-green-700">FRESH</span><span class="text-orange-500">MART</span>
            </a>

      <div class="hidden md:flex gap-8 text-sm font-medium">
        <a href="index.html" class="text-green-700">Home</a>
        <a href="products.html" class="text-green-700">Products</a>
        <a href="category.html" class="text-green-700">Categories</a>
        <a href="cart.html" class="text-green-700">Cart</a>
      </div>

     <a href="checkout.html" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">
        Checkout
      </a>
        </nav>
    </header>

    <!--Hero section-->
    <main>
        <section class="max-w-7xl mx-auto px-6 py-16 grid md:grid-cols-2 gap-10 items-center">
      <div>
        <p class="text-green-700 font-semibold mb-3">100% Fresh & Organic</p>
        <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-6">
          Fresh Groceries Delivered to Your Doorstep
        </h1>
        <p class="text-slate-600 mb-8">
          Shop fresh fruits, vegetables, dairy, snacks, and household essentials from one place.
        </p>

        <div class="flex gap-4">
          <a href="products.html" class="bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700">
            Shop Now
          </a>
          <a href="products.html" class="border border-green-600 text-green-700 px-6 py-3 rounded-xl">
            View Offers
          </a>
        </div>
      </div>

      <div class="bg-white-100 rounded-3xl p-6">
        <img src="assets/grocery.jpg" alt="Fresh groceries" class="rounded-3xl w-full h-96 object-cover">
      </div>
    </section>

    </main>
    
</body>
</html>
